<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Provincias de España — Quiz</title>
<style>
body{margin:0;background:#f2f2f2;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial;color:#1f2937}
header{display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px}
header h1{margin:0;font-size:20px}
.score .chip{display:inline-block;margin-left:8px;border:1px solid #e5e7eb;border-radius:999px;padding:6px 10px;background:#fff;font-weight:700}
.layout{display:grid;grid-template-columns:440px 1fr;gap:16px;max-width:1200px;margin:0 auto;padding:16px;align-items:start}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:360px;overflow:auto;padding-right:6px}
.btn{padding:8px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;font-weight:700;cursor:pointer}
.btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
.status.ok{color:#2ecc71}.status.err{color:#e74c3c}
.map-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;display:flex;align-items:center;justify-content:center;min-height:620px;position:relative;overflow:visible}
#svgHost{width:980px;line-height:0}
#svgHost svg{width:980px;height:auto;display:block}
.provincia{fill:#e0e0e0;stroke:#555;stroke-width:.6;cursor:pointer;transition:fill .15s, opacity .15s, stroke-width .15s}
.provincia:hover{fill:#ffd54f}
.provincia.acierto{fill:#86efac!important}
.provincia.fallo{fill:#fca5a5!important}
.provincia.dim{opacity:.25}
.provincia.ccaa-hint{fill:#cfe8ff!important;opacity:1}
.provincia.hoverlist{fill:#ffe082!important;stroke-width:1}
.tooltip{position:fixed;pointer-events:none;background:#111827;color:#fff;padding:6px 8px;border-radius:8px;font-size:12px;line-height:1;transform:translate(10px,10px);opacity:.95;z-index:9999;display:none;box-shadow:0 6px 24px rgba(0,0,0,.18)}
</style></head>
<body>
<header>
  <h1>🗺️ Provincias de España — Quiz</h1>
  <div class="score"><span class="chip">Puntos: <span id="uiPuntos">0</span></span>
  <span class="chip">Racha: <span id="uiRacha">0</span></span>
  <span class="chip">Mejor: <span id="uiBest">0</span></span></div>
</header>

<div class="layout">
  <section class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
      <select id="modo"><option value="clasico">Clásico (10 preguntas)</option><option value="contrarreloj">Contrarreloj (60 s)</option><option value="endless">Endless</option></select>
      <input id="rondas" type="number" min="5" max="50" value="10">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <button class="btn primary" id="btnJugar">▶️ Empezar</button>
      <button class="btn" id="btnPista">💡 Pista</button>
      <button class="btn" id="btnMapaLibre">🗺️ Mapa libre</button>
      <button class="btn" id="btnReiniciar">↺ Reiniciar</button>
    </div>
    <div class="question" id="pregunta" style="font-weight:800;margin:8px 0">Cargando…</div>
    <div id="pista" style="color:#334155;font-size:13px;margin-bottom:8px"></div>
    <div style="display:flex;justify-content:space-between;color:#64748b">
      <div>Quedan: <span id="uiQuedan">—</span></div>
      <div class="timer" id="uiTiempo">—</div>
    </div>
    <div class="status" id="estado" style="font-weight:800;margin-top:8px"></div>
    <h3 style="margin:12px 0 8px">📋 Provincias (pasa el cursor para ver en el mapa)</h3>
    <div id="listaProvincias" class="grid"></div>
    <div style="margin-top:8px;color:#64748b;font-size:12px">🗺️ Mapa base: Wikimedia Commons — “Provinces of Spain, blank map”. Licencia CC BY-SA 4.0.</div>
  </section>

  <section class="card">
    <div class="map-wrap">
      <div id="svgHost"></div>
    </div>
  </section>
</div>

const ID_TO_PROV = {"path10": "A Coruña", "path418": "Lugo", "path48": "Pontevedra", "path84": "Ourense", "path422": "Asturias", "path28": "León", "path152": "Zamora", "path204": "Salamanca", "path36": "Palencia", "path148": "Valladolid", "path208": "Ávila", "path32": "Burgos", "path188": "Segovia", "path172": "Soria", "path24": "Cantabria", "path44": "Bizkaia", "path16": "Gipuzkoa", "path102": "Álava", "path434": "Navarra", "path92": "La Rioja", "path70": "Huesca", "path68": "Zaragoza", "path458": "Teruel", "path100": "Girona", "path450": "Barcelona", "path182": "Lleida", "path454": "Tarragona", "path216": "Castellón", "path240": "Valencia", "path478": "Alicante", "path318": "Murcia", "path228": "Cáceres", "path272": "Badajoz", "path212": "Madrid", "path232": "Toledo", "path264": "Ciudad Real", "path462": "Guadalajara", "path466": "Cuenca", "path278": "Albacete", "path330": "Huelva", "path334": "Sevilla", "path482": "Cádiz", "path322": "Córdoba", "path326": "Jaén", "path370": "Málaga", "path338": "Granada", "path342": "Almería", "path236": "Illes Balears", "path390": "Santa Cruz de Tenerife", "path374": "Las Palmas", "path3305": "Ceuta", "path3293": "Melilla"};
const PROV_A_CCAA = {"A Coruña": "Galicia", "Lugo": "Galicia", "Pontevedra": "Galicia", "Ourense": "Galicia", "Asturias": "Principado de Asturias", "Cantabria": "Cantabria", "Bizkaia": "País Vasco", "Gipuzkoa": "País Vasco", "Álava": "País Vasco", "Navarra": "Comunidad Foral de Navarra", "La Rioja": "La Rioja", "Huesca": "Aragón", "Zaragoza": "Aragón", "Teruel": "Aragón", "Lleida": "Cataluña", "Girona": "Cataluña", "Barcelona": "Cataluña", "Tarragona": "Cataluña", "Soria": "Castilla y León", "Burgos": "Castilla y León", "Palencia": "Castilla y León", "Valladolid": "Castilla y León", "León": "Castilla y León", "Salamanca": "Castilla y León", "Zamora": "Castilla y León", "Segovia": "Castilla y León", "Ávila": "Castilla y León", "Madrid": "Comunidad de Madrid", "Guadalajara": "Castilla-La Mancha", "Cuenca": "Castilla-La Mancha", "Toledo": "Castilla-La Mancha", "Ciudad Real": "Castilla-La Mancha", "Albacete": "Castilla-La Mancha", "Castellón": "Comunitat Valenciana", "Valencia": "Comunitat Valenciana", "Alicante": "Comunitat Valenciana", "Cáceres": "Extremadura", "Badajoz": "Extremadura", "Córdoba": "Andalucía", "Sevilla": "Andalucía", "Huelva": "Andalucía", "Jaén": "Andalucía", "Granada": "Andalucía", "Málaga": "Andalucía", "Almería": "Andalucía", "Cádiz": "Andalucía", "Illes Balears": "Illes Balears", "Las Palmas": "Canarias", "Santa Cruz de Tenerife": "Canarias", "Murcia": "Región de Murcia", "Ceuta": "Ciudad Autónoma de Ceuta", "Melilla": "Ciudad Autónoma de Melilla"};
const PROVINCIAS = Array.from(new Set(Object.values(ID_TO_PROV))).sort();
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

const state = {jugando:false,modo:"clasico",rondasObjetivo:10,quedan:0,puntos:0,racha:0,mejor:Number(localStorage.getItem("best_score")||0),provActual:null,falloPrevio:false,timer:null,tiempoRestante:0,mapaLibre:false,ccaaHint:null};

function stripDiacritics(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,''); }
function normaliza(s){ return stripDiacritics(String(s)).replace(/\s+/g,' ').trim().toLowerCase(); }
function setStatus(m,ok=false,err=false){const el=$("#estado");el.textContent=m||"";el.className="status"+(ok?" ok":"")+(err?" err":"");}
function setHint(m){$("#pista").textContent=m||"";}
function updateHUD(){$("#uiPuntos").textContent=state.puntos;$("#uiRacha").textContent=state.racha;$("#uiBest").textContent=state.mejor;$("#uiQuedan").textContent=state.modo==="clasico"?state.quedan:(state.modo==="endless"?"∞":"—");$("#uiTiempo").textContent=state.modo==="contrarreloj"? (state.tiempoRestante+"s"):"—";}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function comunidadDe(prov){return PROV_A_CCAA[prov]||"—"}

function showTip(text, x, y){ const tt = $("#tt"); tt.textContent = text; tt.style.display="block"; tt.style.left = (x+12)+"px"; tt.style.top = (y+12)+"px"; }
function hideTip(){ const tt=$("#tt"); tt.style.display="none"; }

function injectSVG(){ const host=$("#svgHost"); const svgText=atob(SVG_B64); const doc=(new DOMParser()).parseFromString(svgText,"image/svg+xml"); const svg=doc.documentElement; svg.id="mapa"; svg.setAttribute("preserveAspectRatio","xMidYMid meet"); host.innerHTML=""; host.appendChild(svg);
  const shapes = svg.querySelectorAll("path[id], polygon[id], polyline[id]");
  shapes.forEach(el=> el.classList.add("provincia"));
  shapes.forEach(el=>{ const id=el.id; const nombre=ID_TO_PROV[id]||id;
    el.addEventListener("mouseenter", e=> showTip(nombre, e.clientX, e.clientY));
    el.addEventListener("mousemove", e=> showTip(nombre, e.clientX, e.clientY));
    el.addEventListener("mouseleave", hideTip);
    el.addEventListener("click", ()=>respuestaProvincia(nombre, el));
  });
  encuadrarMapa();
}

function construirListaProvincias(){ const c=$("#listaProvincias"); c.innerHTML=""; PROVINCIAS.forEach(p=>{ const b=document.createElement("button"); b.className="btn"; b.textContent=p;
    b.addEventListener("mouseenter", ()=>highlightProvinceOnMap(p));
    b.addEventListener("mouseleave", clearListHover);
    b.addEventListener("click", ()=>respuestaProvincia(p,b));
    c.appendChild(b);
  }); }

function highlightProvinceOnMap(prov){ const norm=normaliza(prov); $$("#mapa .provincia").forEach(el=>{ const mapped=ID_TO_PROV[el.id]; if(!mapped) return; if(normaliza(mapped)===norm) el.classList.add("hoverlist"); else el.classList.remove("hoverlist"); }); }
function clearListHover(){ $$("#mapa .provincia").forEach(el=> el.classList.remove("hoverlist")); }

function clearCCAAHighlight(){ $$("#mapa .provincia").forEach(el=> el.classList.remove("ccaa-hint","dim")); state.ccaaHint=null; }
function highlightCCAA(ccaa){ state.ccaaHint=ccaa; $$("#mapa .provincia").forEach(el=>{ const prov=ID_TO_PROV[el.id]; if(!prov) return; if(PROV_A_CCAA[prov]===ccaa) el.classList.add("ccaa-hint"); else el.classList.add("dim"); }); }

function nuevaPregunta(){ clearListHover(); clearCCAAHighlight(); state.provActual=rand(PROVINCIAS); state.falloPrevio=false; $("#pregunta").textContent="¿Dónde está "+state.provActual+"? Pulsa en el mapa o la lista."; setHint(""); setStatus("Elige provincia…"); }
function empezar(){ hideTip(); clearListHover(); clearCCAAHighlight(); state.mapaLibre=false; state.modo=$("#modo").value; state.rondasObjetivo=Math.max(5,Math.min(50,Number($("#rondas").value||10))); state.puntos=0; state.racha=0; state.quedan=state.modo==="clasico"?state.rondasObjetivo:9999; state.tiempoRestante=state.modo==="contrarreloj"?60:0; state.jugando=true; updateHUD(); if(state.modo==="contrarreloj"){ if(state.timer) clearInterval(state.timer); state.timer=setInterval(()=>{ state.tiempoRestante--; updateHUD(); if(state.tiempoRestante<=0){ clearInterval(state.timer); finalizar("⏱️ ¡Tiempo!"); } },1000); } nuevaPregunta(); }
function finalizar(msg){ hideTip(); clearListHover(); clearCCAAHighlight(); state.jugando=false; setStatus(msg||"🏁 Fin de la partida"); setHint(""); $("#pregunta").textContent="Pulsa “Empezar” para jugar otra vez"; if(state.timer){ clearInterval(state.timer); state.timer=null; } if(state.puntos>state.mejor){ state.mejor=state.puntos; localStorage.setItem("best_score", String(state.mejor)); } updateHUD(); }
function darPista(){ if(!state.jugando||!state.provActual) return; const ccaa = comunidadDe(state.provActual); setHint("Pista: está en la comunidad de "+ccaa+"."); clearCCAAHighlight(); highlightCCAA(ccaa); }
function respuestaProvincia(prov, originEl){ if(state.mapaLibre||!state.jugando||!state.provActual) return; const ok=normaliza(prov)===normaliza(state.provActual); if(originEl){ originEl.classList.add(ok?"acierto":"fallo"); setTimeout(()=>originEl.classList.remove("acierto","fallo"), 600); } if(ok){ hideTip(); clearListHover(); clearCCAAHighlight(); const pts=state.falloPrevio?5:10; state.puntos+=pts; state.racha+=1; setStatus("✅ ¡Bien! "+prov+" — +"+pts+" puntos.", true, false); setHint("("+prov+" — "+comunidadDe(prov)+")"); if(state.modo==="clasico"){ state.quedan-=1; if(state.quedan<=0) return finalizar("🏁 ¡Ronda completada!"); } updateHUD(); setTimeout(nuevaPregunta, 500); } else { state.puntos-=3; state.racha=0; state.falloPrevio=true; setStatus("❌ No es esa. ¡Prueba otra vez!", false, true); if(!$("#pista").textContent) darPista(); updateHUD(); } }

function encuadrarMapa(){ const svg=$("#mapa"); if(!svg) return; const shapes=svg.querySelectorAll(".provincia"); if(!shapes.length) return; let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity; shapes.forEach(el=>{ try{ const b=el.getBBox(); minX=Math.min(minX,b.x); minY=Math.min(minY,b.y); maxX=Math.max(maxX,b.x+b.width); maxY=Math.max(maxY,b.y+b.height); }catch(e){} }); const pad=5; svg.setAttribute("viewBox",[minX-pad,minY-pad,(maxX-minX)+2*pad,(maxY-minY)+2*pad].join(" ")); svg.setAttribute("preserveAspectRatio","xMidYMid meet"); }

document.addEventListener("DOMContentLoaded",()=>{ injectSVG(); construirListaProvincias(); updateHUD(); document.getElementById("btnJugar").onclick=empezar; document.getElementById("btnReiniciar").onclick=()=>finalizar("🔁 Reiniciado."); document.getElementById("btnPista").onclick=darPista; document.getElementById("btnMapaLibre").onclick=()=>{ state.mapaLibre=!state.mapaLibre; setStatus(state.mapaLibre?"🗺️ Modo mapa libre activo: explora sin puntos.":"", false,false); }; empezar(); });
</script>
