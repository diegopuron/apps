<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detectives Lógicos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <section class="hero-main">
        <span class="kicker">🕵️ Pensamiento lógico · 5º y 6º</span>
        <h1>Detectives Lógicos</h1>
        <p>
          Resuelve casos usando pistas, descartes e inferencias. Marca lo que es seguro,
          lo que es imposible y lo que todavía está pendiente. La clave no es adivinar:
          es justificar cada paso.
        </p>
      </section>

      <aside class="progress-card" aria-label="Progreso">
        <div>
          <h2>Progreso de investigación</h2>
          <p class="level-meta" id="progressText">Nivel 1 desbloqueado</p>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="code-box">
          <input id="codeInput" type="text" placeholder="Introduce un código" autocomplete="off" />
          <button class="btn-ghost" id="codeButton" type="button">Desbloquear</button>
        </div>
      </aside>
    </header>

    <main class="layout">
      <aside class="panel">
        <h2>Casos</h2>
        <div class="levels" id="levelsList"></div>
      </aside>

      <section class="logic-card" id="gameArea" aria-live="polite"></section>
    </main>
  </div>

  <script src="js/levels.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
